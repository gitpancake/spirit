[profile.default]
# Directory structure
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache_foundry"
script = "script"

# Solidity compiler settings (matching Hardhat config)
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1000
via_ir = true

# Additional compiler settings
auto_detect_solc = false
use_literal_content = false
bytecode_hash = "none"
cbor_metadata = true

# Test & script settings
verbosity = 3
ffi = false
fs_permissions = [{ access = "read-write", path = "./" }]

# Fuzz testing
fuzz = { runs = 256 }

# Invariant testing
invariant = { runs = 256, depth = 15 }

# RPC endpoints (matching Hardhat networks)
[profile.default.rpc_endpoints]
ethereum = "https://eth-mainnet.g.alchemy.com/v2/${RPC_API_KEY}"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${RPC_API_KEY}"
base = "https://base-mainnet.g.alchemy.com/v2/${RPC_API_KEY}"
base-sepolia = "https://base-sepolia.g.alchemy.com/v2/${RPC_API_KEY}"
localhost = "http://127.0.0.1:8545"

# Etherscan verification (matching Hardhat etherscan config)
[profile.default.etherscan]
ethereum = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
base-sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }

# Formatter settings
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"
wrap_comments = true

# Documentation settings
[doc]
out = "docs"
repository = "https://github.com/spirit/smart-contracts"
ignore = ["**/*.t.sol"]
